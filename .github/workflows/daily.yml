name: Daily Marketing Bot

permissions:
  contents: write

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 9 * * *"   # 09:00 UTC daily

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # ensures full history for rebase

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"  # adjust if needed

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install requests feedparser

      - name: Run generator
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python3 scripts/generate_daily.py

      - name: Commit and push output
        run: |
          git config user.name "marketing-bot"
          git config user.email "marketing-bot@users.noreply.github.com"
          
          git add output/*.txt

          # Only commit if there are changes
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Daily news content $(date -u +%Y-%m-%d)"

          # Pull latest changes and rebase
          git pull --rebase origin main

          # Push new changes
          git push origin main
